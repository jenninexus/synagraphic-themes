<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synagraphic — Cyberpunk Theme Pack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #c8c8e0;
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Fade-in animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .header {
      text-align: center;
      padding: 60px 20px 40px;
      animation: fadeInUp 0.8s ease-out both;
    }
    .header h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, #8b6aff, #3dd8d8, #d84a90);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    .header .subtitle {
      font-family: 'Orbitron', sans-serif;
      font-weight: 400;
      font-size: clamp(0.7rem, 1.5vw, 0.95rem);
      color: #4e4e72;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      gap: 28px;
      padding: 20px 28px 60px;
      max-width: 1400px;
      margin: 0 auto;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    }

    /* Featured cards (Neon Decay, Ghost Protocol, Plasma Drift) are larger */
    .card.featured {
      grid-row: span 1;
    }

    .card {
      position: relative;
      border-radius: 16px;
      padding: 28px;
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      animation: fadeInUp 0.8s ease-out both;
    }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }
    .card:nth-child(5) { animation-delay: 0.5s; }
    .card:nth-child(6) { animation-delay: 0.6s; }

    .card:hover {
      transform: translateY(-6px);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .card-header img {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
    }
    .card.featured .card-header img {
      width: 64px;
      height: 64px;
    }
    .card-header h2 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: 0.06em;
      text-shadow:
        0 0 4px var(--accent),
        0 0 14px var(--accent-mid),
        0 0 40px var(--accent-dim);
      transition: text-shadow 0.3s ease;
    }
    .card:hover .card-header h2 {
      text-shadow:
        0 0 6px var(--accent),
        0 0 20px var(--accent),
        0 0 50px var(--accent-mid),
        0 0 80px var(--accent-dim);
    }
    .card.featured .card-header h2 {
      font-size: 1.2rem;
    }
    .card-header .tag {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--accent-dim);
      color: var(--accent);
      margin-left: auto;
    }

    /* Swatches */
    .swatches {
      display: flex;
      gap: 6px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .swatch {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      cursor: default;
    }
    .card.featured .swatch {
      width: 30px;
      height: 30px;
    }
    .swatch .tip {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #16161e;
      color: #c8c8e0;
      font-size: 0.6rem;
      padding: 3px 6px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      margin-bottom: 4px;
      z-index: 10;
    }
    .swatch:hover .tip { display: block; }

    /* Code preview */
    .code-block {
      border-radius: 10px;
      padding: 16px;
      font-size: 0.72rem;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre;
      font-family: 'JetBrains Mono', monospace;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .card.featured .code-block {
      font-size: 0.78rem;
      padding: 18px;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 40px 20px 60px;
      animation: fadeIn 1s ease-out 0.8s both;
    }
    .footer a {
      color: #8b6aff;
      text-decoration: none;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      transition: color 0.2s;
    }
    .footer a:hover { color: #a88aff; }
    .footer .pub {
      font-size: 0.65rem;
      color: #3a3a5e;
      margin-top: 8px;
      letter-spacing: 0.05em;
    }

    /* Responsive: desktop shows 3 cols for featured + 2 standard */
    @media (min-width: 1100px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    @media (max-width: 740px) {
      .grid {
        grid-template-columns: 1fr;
        padding: 16px;
      }
    }
  </style>
</head>
<body>

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderCode(t) {
  const c = t.tokens;
  return `<span style="color:${c.comment};font-style:italic">// Neural interface v2.0</span>
<span style="color:${c.keyword}">interface</span> <span style="color:${c.interface}">SynapticNode</span> <span style="color:${c.punctuation}">{</span>
  <span style="color:${c.property}">id</span><span style="color:${c.punctuation}">:</span> <span style="color:${c.type}">string</span><span style="color:${c.punctuation}">;</span>
  <span style="color:${c.property}">weight</span><span style="color:${c.punctuation}">:</span> <span style="color:${c.type}">number</span><span style="color:${c.punctuation}">;</span>
<span style="color:${c.punctuation}">}</span>

<span style="color:${c.controlFlow};font-style:italic">async</span> <span style="color:${c.keyword}">function</span> <span style="color:${c.function}">propagate</span><span style="color:${c.punctuation}">(</span>
  <span style="color:${c.parameter}">nodes</span><span style="color:${c.punctuation}">:</span> <span style="color:${c.interface}">SynapticNode</span><span style="color:${c.punctuation}">[]</span><span style="color:${c.punctuation}">,</span>
  <span style="color:${c.parameter}">signal</span><span style="color:${c.punctuation}">:</span> <span style="color:${c.type}">number</span>
<span style="color:${c.punctuation}">):</span> <span style="color:${c.type}">Promise</span><span style="color:${c.punctuation}">&lt;</span><span style="color:${c.type}">void</span><span style="color:${c.punctuation}">&gt;</span> <span style="color:${c.punctuation}">{</span>
  <span style="color:${c.keyword}">const</span> <span style="color:${c.variable}">active</span> <span style="color:${c.operator}">=</span> <span style="color:${c.parameter}">nodes</span><span style="color:${c.punctuation}">.</span><span style="color:${c.function}">filter</span><span style="color:${c.punctuation}">(</span>
    <span style="color:${c.parameter}">n</span> <span style="color:${c.operator}">=&gt;</span> <span style="color:${c.parameter}">n</span><span style="color:${c.punctuation}">.</span><span style="color:${c.property}">weight</span> <span style="color:${c.operator}">&gt;</span> <span style="color:${c.parameter}">signal</span>
  <span style="color:${c.punctuation}">)</span><span style="color:${c.punctuation}">;</span>
  <span style="color:${c.controlFlow}">await</span> <span style="color:${c.thisKw};font-style:italic">this</span><span style="color:${c.punctuation}">.</span><span style="color:${c.function}">emit</span><span style="color:${c.punctuation}">(</span><span style="color:${c.variable}">active</span><span style="color:${c.punctuation}">)</span><span style="color:${c.punctuation}">;</span>
<span style="color:${c.punctuation}">}</span>`;
}

const grid = document.getElementById('theme-grid');

// Reorder: featured themes first, then standard
const ordered = [
  themes[1], // Neon Decay
  themes[5], // Martian
  themes[2], // Ghost Protocol
  themes[3], // Plasma Drift
  themes[0], // Void Circuit
  themes[4], // Acid Rain
];

ordered.forEach(t => {
  const card = document.createElement('div');
  card.className = 'card' + (t.featured ? ' featured' : '');
  card.style.setProperty('--accent', t.accent);
  card.style.setProperty('--accent-mid', t.accent + '66');
  card.style.setProperty('--accent-dim', t.accent + '22');
  card.style.borderColor = t.accent + '22';
  card.style.boxShadow = `0 0 30px ${t.accent}10, inset 0 0 30px ${t.accent}05`;

  card.addEventListener('mouseenter', () => {
    card.style.borderColor = t.accent + '55';
    card.style.boxShadow = `0 8px 40px ${t.accent}25, inset 0 0 40px ${t.accent}08`;
  });
  card.addEventListener('mouseleave', () => {
    card.style.borderColor = t.accent + '22';
    card.style.boxShadow = `0 0 30px ${t.accent}10, inset 0 0 30px ${t.accent}05`;
  });

  const swatchesHTML = t.swatches.map(s =>
    `<div class="swatch" style="background:${s.color}"><span class="tip">${s.label} ${s.color}</span></div>`
  ).join('');

  card.innerHTML = `
    <div class="card-header">
      <img src="./icons/${t.slug}.svg" alt="${t.name} icon">
      <div>
        <h2 style="color:${t.accent}">${t.name}</h2>
      </div>
      ${t.featured ? '<span class="tag">featured</span>' : ''}
    </div>
    <div class="swatches">${swatchesHTML}</div>
    <div class="code-block" style="background:${t.bg};color:${t.text}">${renderCode(t)}</div>
  `;

  grid.appendChild(card);
});
